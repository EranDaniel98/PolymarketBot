polymarket:
  api_key: ""       # Set via POLYMARKET_API_KEY env var
  api_secret: ""    # Set via POLYMARKET_API_SECRET env var
  private_key: ""   # Set via POLYMARKET_PRIVATE_KEY env var
  chain_id: 137

signals:
  news:
    enabled: false
    poll_interval: 300
    weight: 0.00
    newsapi_key: ""  # Set via NEWSAPI_KEY env var
  social:
    enabled: false
    poll_interval: 600
    weight: 0.00
  polls:
    enabled: true
    poll_interval: 3600
    weight: 0.10
  llm:
    enabled: true
    weight: 0.20
    model: "gpt-4o-mini"
    screening_model: "gpt-4o-mini"
    anthropic_api_key: ""  # Set via ANTHROPIC_API_KEY env var
    openai_api_key: ""     # Set via OPENAI_API_KEY env var
    ensemble_enabled: false
    confidence_discount: 0.70
  bookmaker:
    enabled: true
    poll_interval: 60
    weight: 0.10
    odds_api_key: ""  # Set via ODDS_API_KEY env var
  favorite_longshot:
    enabled: true
    weight: 0.20
    min_price_short: 0.92
    max_price_long: 0.08
    min_volume: 5000
    min_days: 3
  divergence:
    enabled: true
    weight: 0.15
    min_divergence: 0.08
    min_forecasters: 50
    min_days: 3
  weather:
    enabled: true
    weight: 0.20
  whale:
    enabled: true
    weight: 0.15
    poll_interval: 30
    single_trade_threshold: 10000
    cumulative_threshold: 25000
    window_seconds: 300
  crypto_price:
    enabled: true
    weight: 0.20
    min_divergence: 0.05
    exchanges: ["binance"]
    poll_interval: 60
    max_days_to_expiry: 7
  fast_trader:
    enabled: false

arbitrage:
  poll_interval: 30
  min_spread: 0.05
  structural_arb:
    enabled: true
    fee_rate: 0.02
    min_profit_pct: 0.005
    max_position_usd: 35
    cancel_timeout: 60
  platforms:
    kalshi:
      enabled: true
    manifold:
      enabled: true

risk:
  max_position_pct: 0.10
  max_exposure_pct: 0.60
  max_daily_loss_pct: 0.08
  max_correlated_exposure_pct: 0.20
  min_edge: 0.04
  kelly_fraction: 0.45
  kelly_tiers:
    - max_confidence: 0.52
      fraction: 0.15
    - max_confidence: 0.62
      fraction: 0.25
    - max_confidence: 0.75
      fraction: 0.35
    - max_confidence: 1.0
      fraction: 0.45
  bootstrap_trades: 30
  bootstrap_size_pct: 0.02
  min_trade_size: 5.0
  cooldown_seconds: 300

execution:
  default_order_type: "limit"
  max_slippage: 0.01
  max_retries: 3
  paper_trading: true
  paper_balance: 300.0

exit:
  take_profit: 0.45
  stop_loss: -0.10
  trailing_stop: 0.08
  trailing_stop_activation: 0.06
  edge_gone_threshold: 0.02
  time_decay_hours: 24
  max_hold_hours: 120

notifications:
  telegram:
    enabled: true
    bot_token: ""     # Set via TELEGRAM_BOT_TOKEN env var
    chat_id: ""       # Set via TELEGRAM_CHAT_ID env var
    approval_timeout: 300
    auto_approve_window: 3600
  discord:
    enabled: false
    webhook_url: ""

logging:
  file_enabled: true
  file_path: "logs/bot.jsonl"
  max_size_mb: 50
  backup_count: 5

confidence_thresholds:
  auto_execute: 0.80
  notify: 0.50
  auto_approve_all: true

fee:
  default_taker_fee: 0.01
  maker_fee: 0.0
  category_taker_fees:
    geopolitics: 0.0
    politics: 0.01
    sports: 0.0075
    crypto: 0.018
    finance: 0.012
    culture: 0.01
    weather: 0.01

web:
  enabled: true
  host: "0.0.0.0"
  port: 8080
