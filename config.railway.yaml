polymarket:
  api_key: ""       # Set via POLYMARKET_API_KEY env var
  api_secret: ""    # Set via POLYMARKET_API_SECRET env var
  private_key: ""   # Set via POLYMARKET_PRIVATE_KEY env var
  chain_id: 137

signals:
  news:
    enabled: false
    poll_interval: 300
    weight: 0.00
    newsapi_key: ""  # Set via NEWSAPI_KEY env var
  social:
    enabled: false
    poll_interval: 600
    weight: 0.00
  polls:
    enabled: true
    poll_interval: 3600
    weight: 0.10
  llm:
    enabled: true
    weight: 0.25
    model: "claude-sonnet-4-20250514"
    screening_model: "claude-3-haiku-20240307"
    anthropic_api_key: ""  # Set via ANTHROPIC_API_KEY env var
    openai_api_key: ""     # Set via OPENAI_API_KEY env var
    ensemble_enabled: true
    aggregation: "trimmed_mean"
    ensemble_models:
      - provider: "anthropic"
        model: "claude-sonnet-4-20250514"
        weight: 0.40
      - provider: "openai"
        model: "gpt-4o"
        weight: 0.35
      - provider: "openai"
        model: "gpt-4o-mini"
        weight: 0.25
  bookmaker:
    enabled: true
    poll_interval: 60
    weight: 0.10
    odds_api_key: ""  # Set via ODDS_API_KEY env var
  favorite_longshot:
    enabled: true
    weight: 0.20
    min_price_short: 0.92
    max_price_long: 0.08
    min_volume: 5000
    min_days: 3
  divergence:
    enabled: true
    weight: 0.15
    min_divergence: 0.08
    min_forecasters: 50
    min_days: 3
  weather:
    enabled: true
    weight: 0.20
  whale:
    enabled: true
    weight: 0.15
    poll_interval: 30
    single_trade_threshold: 10000
    cumulative_threshold: 25000
    window_seconds: 300
  fast_trader:
    enabled: false

arbitrage:
  poll_interval: 30
  min_spread: 0.05
  structural_arb:
    enabled: true
    fee_rate: 0.02
    min_profit_pct: 0.005
    max_position_usd: 50
    cancel_timeout: 60
  platforms:
    kalshi:
      enabled: true
    manifold:
      enabled: true

risk:
  max_position_pct: 0.10
  max_exposure_pct: 0.60
  max_daily_loss_pct: 0.08
  max_correlated_exposure_pct: 0.20
  min_edge: 0.05
  kelly_fraction: 0.5
  bootstrap_trades: 30
  bootstrap_size_pct: 0.04
  cooldown_seconds: 300

execution:
  default_order_type: "limit"
  max_slippage: 0.01
  max_retries: 3
  paper_trading: true
  paper_balance: 1500.0

notifications:
  telegram:
    enabled: true
    bot_token: ""     # Set via TELEGRAM_BOT_TOKEN env var
    chat_id: ""       # Set via TELEGRAM_CHAT_ID env var
    approval_timeout: 300
    auto_approve_window: 3600
  discord:
    enabled: false
    webhook_url: ""

logging:
  file_enabled: true
  file_path: "logs/bot.jsonl"
  max_size_mb: 50
  backup_count: 5

confidence_thresholds:
  auto_execute: 0.85
  notify: 0.55
  auto_approve_all: true

web:
  enabled: true
  host: "0.0.0.0"
  port: 8080
