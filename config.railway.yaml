# ============================================================
# Railway deployment config for Polymarket Weather Arbitrage Bot
# ------------------------------------------------------------
# Secrets are injected via Railway environment variables:
#   DATABASE_URL             (auto from Railway PostgreSQL plugin)
#   POLYMARKET_API_KEY
#   POLYMARKET_API_SECRET
#   POLYMARKET_PRIVATE_KEY
#   TELEGRAM_BOT_TOKEN
#   TELEGRAM_CHAT_ID
#   DASH_PASS
#   PORT                     (auto-injected by Railway — overrides web.port)
# ============================================================

polymarket:
  api_key: ""
  api_secret: ""
  private_key: ""
  chain_id: 137

database:
  # Overridden by DATABASE_URL env var (Railway Postgres plugin)
  # postgresql:// scheme is auto-rewritten to postgresql+asyncpg://
  url: "postgresql+asyncpg://user:pass@localhost:5432/polymarket_weather"

weather:
  metar:
    poll_interval: 1800
    stale_threshold: 10800
    api_url: "https://aviationweather.gov/api/data/metar"
    hours_lookback: 3
  taf:
    poll_interval: 21600
    api_url: "https://aviationweather.gov/api/data/taf"
  nwp:
    poll_interval: 21600
    api_url: "https://api.open-meteo.com/v1/ensemble"
    models: ["ecmwf_ifs025"]

forecast:
  metar_only_hours: 6
  blend_cutoff_hours: 30
  metar_blend_weight: 0.6
  min_confidence: 0.70
  long_range_min_confidence: 0.80
  long_range_days: 5

markets:
  scan_interval: 300
  discovery_interval: 900
  gamma_api_url: "https://gamma-api.polymarket.com"
  # Hardcoded tag ID for 'temperature' (103040) — runtime discovery by label
  # is unreliable and the temperature tag is narrower + more useful than the
  # broader 'weather' tag (84) which also covers earthquakes/measles/volcanoes.
  weather_tag_id: 103040
  weather_tags: ["weather", "temperature", "climate"]
  allowed_metrics: ["temperature"]

edge:
  min_edge: 0.12
  min_liquidity_usdc: 500
  min_confidence: 0.70
  min_hours_to_resolution: 2
  max_hours_to_resolution: 168
  kelly_fraction: 0.5

risk:
  max_position_usdc: 50
  min_trade_size_usdc: 5
  max_open_positions: 20
  daily_loss_cap_usdc: 200
  max_exposure_per_city_usdc: 150
  max_exposure_per_date_usdc: 200
  drawdown_pause_pct: 0.15

trading:
  order_type: "limit"
  slippage_tolerance: 0.02
  max_retries: 3
  exit_on_edge_inversion: true
  edge_inversion_threshold: -0.05
  paper_trading: true     # Start in paper mode on Railway
  paper_balance: 1000
  cancel_before_resolution_minutes: 90

cities:
  file: "config/cities.json"

scheduler:
  metar_poll: 1800
  taf_poll: 21600
  nwp_poll: 21600
  market_scan: 300
  market_discovery: 900
  mismatch_detection: 300
  trade_execution: 60
  position_monitor: 120
  settlement_check: 600
  stale_data_check: 900
  daily_report: "08:00"
  calibration_update: "06:00"

notifications:
  telegram:
    enabled: true
    bot_token: ""
    chat_id: ""
    alert_on:
      opportunity_found: true
      trade_placed: true
      trade_settled: true
      risk_limit_approached: true
      data_stale: true
      system_error: true

calibration:
  min_samples: 30
  lookback_days: 90

logging:
  file_enabled: false   # Railway captures stdout; skip file logging
  file_path: "logs/bot.jsonl"
  max_size_mb: 50
  backup_count: 5

web:
  enabled: true
  host: "0.0.0.0"       # Overridden by PORT env handling in config.py
  port: 8080

fee:
  default_taker_fee: 0.01
  maker_fee: 0.0
  weather_taker_fee: 0.01
