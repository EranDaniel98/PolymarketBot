polymarket:
  api_key: "your-api-key"
  api_secret: "your-api-secret"
  private_key: "your-eth-private-key"
  chain_id: 137  # Polygon

signals:
  news:
    enabled: true
    poll_interval: 300
    weight: 0.2
    newsapi_key: "your-newsapi-key"
  social:
    enabled: true
    poll_interval: 600
    weight: 0.15
    # No credentials needed — uses Reddit's public JSON endpoints
    # Optionally customize which subreddits to monitor:
    # subreddits: ["polymarket", "predictions", "wallstreetbets", "politics", "crypto", "sports"]
  polls:
    enabled: true
    poll_interval: 3600
    weight: 0.25
  llm:
    enabled: true
    weight: 0.25
    model: "claude-sonnet-4-6-20250514"
    anthropic_api_key: "your-anthropic-key"
  bookmaker:
    enabled: true
    poll_interval: 60
    weight: 0.15
    odds_api_key: "your-odds-api-key"

arbitrage:
  poll_interval: 30
  min_spread: 0.05
  platforms:
    kalshi:
      enabled: true
    manifold:
      enabled: true

risk:
  max_position_pct: 0.10          # Max 10% per market ($30 on $300 bankroll)
  max_exposure_pct: 0.60          # Max 60% total exposure
  max_daily_loss_pct: 0.08        # Circuit breaker at 8% daily loss ($24)
  max_correlated_exposure_pct: 0.20
  min_edge: 0.05                  # Only trade with ≥5% edge (more selective with small bankroll)
  kelly_fraction: 0.5
  bootstrap_trades: 20            # Fewer bootstrap trades before switching to Kelly
  bootstrap_size_pct: 0.04        # 4% per trade during bootstrap ($12 — above $10 minimum)
  cooldown_seconds: 300

execution:
  default_order_type: "limit"
  max_slippage: 0.01
  max_retries: 3

notifications:
  telegram:
    enabled: true
    bot_token: "your-bot-token"
    chat_id: "your-chat-id"
    approval_timeout: 300
  discord:
    enabled: false
    webhook_url: ""

confidence_thresholds:
  auto_execute: 0.85              # Higher bar for auto-trades (protect small bankroll)
  notify: 0.55                    # Notify you on medium-confidence for manual decision
