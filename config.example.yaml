polymarket:
  api_key: "your-api-key"
  api_secret: "your-api-secret"
  private_key: "your-eth-private-key"
  chain_id: 137  # Polygon

signals:
  news:
    enabled: false                  # Disabled — keyword matching is noise, LLM reads headlines directly
    poll_interval: 300
    weight: 0.00
    newsapi_key: "your-newsapi-key"
  social:
    enabled: false                  # Disabled — Reddit sentiment is lagging/contrarian
    poll_interval: 600
    weight: 0.00
  polls:
    enabled: true
    poll_interval: 3600
    weight: 0.10
  llm:
    enabled: true
    weight: 0.25
    model: "claude-opus-4-6-20250514"
    screening_model: "claude-haiku-4-5-20250514"  # Cheap screening before expensive Opus calls
    anthropic_api_key: "your-anthropic-key"
    openai_api_key: "your-openai-key"
    ensemble_enabled: true
    aggregation: "trimmed_mean"
    ensemble_models:
      - provider: "anthropic"
        model: "claude-opus-4-6-20250514"
        weight: 0.40
      - provider: "openai"
        model: "gpt-4o"
        weight: 0.35
      - provider: "anthropic"
        model: "claude-sonnet-4-6-20250514"
        weight: 0.25
  bookmaker:
    enabled: true
    poll_interval: 60
    weight: 0.10
    odds_api_key: "your-odds-api-key"
  favorite_longshot:
    enabled: true                   # Zero-cost signal exploiting favorite-longshot bias
    weight: 0.20
    min_price_short: 0.92           # Short contracts above this price
    max_price_long: 0.08            # Buy contracts below this price
    min_volume: 5000                # Minimum market volume for liquidity
    min_days: 3                     # Minimum days to resolution
  divergence:
    enabled: true                   # Cross-platform divergence (Metaculus + Manifold)
    weight: 0.15
    min_divergence: 0.08            # Minimum price gap to trigger
    min_forecasters: 50             # Minimum forecaster count on other platform
    min_days: 3
  weather:
    enabled: true                   # Weather forecast vs market price (73% documented win rate)
    weight: 0.20
  whale:
    enabled: true
    weight: 0.15
    poll_interval: 30
    single_trade_threshold: 10000
    cumulative_threshold: 25000
    window_seconds: 300
  fast_trader:
    enabled: false                  # Disabled — fires on Reddit headlines, false positives

arbitrage:
  poll_interval: 30
  min_spread: 0.05
  structural_arb:
    enabled: true
    fee_rate: 0.02
    min_profit_pct: 0.005
    max_position_usd: 50
    cancel_timeout: 60
  platforms:
    kalshi:
      enabled: true
    manifold:
      enabled: true

risk:
  max_position_pct: 0.10          # Max 10% per market ($30 on $300 bankroll)
  max_exposure_pct: 0.60          # Max 60% total exposure
  max_daily_loss_pct: 0.08        # Circuit breaker at 8% daily loss ($24)
  max_correlated_exposure_pct: 0.20
  min_edge: 0.05                  # Only trade with >=5% edge (more selective with small bankroll)
  kelly_fraction: 0.5
  bootstrap_trades: 20            # Fewer bootstrap trades before switching to Kelly
  bootstrap_size_pct: 0.04        # 4% per trade during bootstrap ($12 — above $10 minimum)
  cooldown_seconds: 300

execution:
  default_order_type: "limit"
  max_slippage: 0.01
  max_retries: 3
  paper_trading: true             # Set to false for real trading with real money

notifications:
  telegram:
    enabled: true
    bot_token: "your-bot-token"
    chat_id: "your-chat-id"
    approval_timeout: 300
  discord:
    enabled: false
    webhook_url: ""

confidence_thresholds:
  auto_execute: 0.85              # Higher bar for auto-trades (protect small bankroll)
  notify: 0.55                    # Notify you on medium-confidence for manual decision

web:
  enabled: false                  # Set to true to enable web dashboard
  host: "127.0.0.1"
  port: 8080
